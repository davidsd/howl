name:                matching
version:             0.1.0.0
github:              "githubuser/matching"
license:             BSD-3-Clause
author:              "David Simmons-Duffin"
maintainer:          "dsd@caltech.edu"
copyright:           "2026 David Simmons-Duffin"
language: GHC2021

extra-source-files:
- README.md
- CHANGELOG.md

description:         An implementation of the subset of the Wolfram language in Haskell

dependencies:
- base >= 4.7 && < 5
- containers
- text

ghc-options:
- -Wall
- -Wcompat
- -Widentities
- -Wincomplete-record-updates
- -Wincomplete-uni-patterns
- -Wmissing-home-modules
- -Wpartial-fields
- -Wredundant-constraints

library:
  source-dirs: src

executables:
  matching-exe:
    main:                Main.hs
    source-dirs:         app
    ghc-options:
    - -threaded
    - -rtsopts
    - -with-rtsopts=-N
    dependencies:
    - matching

tests:
  matching-test:
    main:                MicroMath/Test.hs
    source-dirs:         test
    ghc-options:
    - -threaded
    - -rtsopts
    - -with-rtsopts=-N
    dependencies:
    - matching
