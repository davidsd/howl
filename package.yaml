name:                howl
version:             0.1.0.0
github:              "davidsd/howl"
license:             BSD-3-Clause
author:              "David Simmons-Duffin"
maintainer:          "dsd@caltech.edu"
copyright:           "2026 David Simmons-Duffin"
language: GHC2021

extra-source-files:
- README.md
- wl/StdLib.wl

description:         An implementation of a small subset of the Wolfram language in Haskell

dependencies:
- base >= 4.7 && < 5
- containers
- text
- mtl
- megaparsec
- scientific
- parser-combinators
- deepseq
- hashable
- primitive
- text-short
- hashtables
- template-haskell
- symbolize
- combinat
- exceptions
- optparse-applicative
- rounded
- bytestring
- file-embed

ghc-options:
- -Wall
- -Wcompat
- -Widentities
- -Wincomplete-record-updates
- -Wincomplete-uni-patterns
- -Wmissing-home-modules
- -Wpartial-fields
- -Wredundant-constraints
- -O2

library:
  source-dirs: src

executables:
  howl-repl:
    main:                Main.hs
    source-dirs:         app
    ghc-options:
    - -threaded
    - -rtsopts
    - -with-rtsopts=-N
    - -O2
    dependencies:
    - howl
    - haskeline
    - text

  fib:
    main:                Main.hs
    source-dirs: examples/fib
    ghc-options:
    - -threaded
    - -rtsopts
    - -with-rtsopts=-N
    - -O2
    dependencies:
    - howl

  laplace:
    main:                Main.hs
    source-dirs: examples/laplace
    ghc-options:
    - -threaded
    - -rtsopts
    - -with-rtsopts=-N
    - -O2
    dependencies:
    - howl
    - file-embed

  susyO2:
    main:                Main.hs
    source-dirs: examples/susyO2
    ghc-options:
    - -threaded
    - -rtsopts
    - -with-rtsopts=-N
    - -O2
    dependencies:
    - howl
    - file-embed
    - matrix

tests:
  howl-test:
    main:                Spec.hs
    source-dirs:         test
    ghc-options:
    - -threaded
    - -rtsopts
    - -with-rtsopts=-N
    dependencies:
    - howl
    - hspec
    - QuickCheck
