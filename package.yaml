name:                howl
version:             0.1.0.0
github:              "davidsd/howl"
synopsis:            A small Wolfram Language interpreter and symbolic rewriting library
category:            Language, Computer Algebra
license:             BSD-3-Clause
author:              "David Simmons-Duffin"
maintainer:          "dsd@caltech.edu"
copyright:           "2026 David Simmons-Duffin"
language: GHC2021

extra-source-files:
- wl/Prelude.wl

extra-doc-files:
- README.md
- CHANGELOG.md
- docs/images/tree-before.svg
- docs/images/tree-after.svg

description:         An implementation of a small subset of the Wolfram language in Haskell

ghc-options:
- -Wall
- -Wcompat
- -Widentities
- -Wincomplete-record-updates
- -Wincomplete-uni-patterns
- -Wmissing-home-modules
- -Wpartial-fields
- -Wunused-packages
- -Wredundant-constraints

library:
  source-dirs: src
  dependencies:
  - base >= 4.7 && < 5
  - containers >= 0.6 && < 0.9
  - text >= 2.0 && < 2.2
  - mtl >= 2.2 && < 2.4
  - megaparsec >= 9.0 && < 10
  - scientific >= 0.3 && < 0.4
  - parser-combinators >= 1.3 && < 1.4
  - hashable >= 1.4 && < 1.6
  - text-short >= 0.1 && < 0.2
  - hashtables >= 1.3 && < 1.5
  - template-haskell >= 2.19 && < 2.25
  - symbolize >= 1.0 && < 1.1
  - combinat >= 0.2 && < 0.3
  - exceptions >= 0.10 && < 0.11
  - rounded >= 1.1 && < 1.2
  - file-embed >= 0.0.15 && < 0.1

executables:
  howl-exe:
    main:                Main.hs
    source-dirs:         app
    ghc-options:
    - -threaded
    - -rtsopts
    - -with-rtsopts=-N
    dependencies:
    - base
    - howl
    - haskeline >= 0.8 && < 0.9
    - mtl
    - optparse-applicative >= 0.18 && < 0.20
    - text

  howl-jupyter:
    main:                Main.hs
    source-dirs:         app-jupyter
    ghc-options:
    - -threaded
    - -rtsopts
    - -with-rtsopts=-N
    dependencies:
    - base
    - howl
    - aeson >= 2.2 && < 2.3
    - bytestring >= 0.11 && < 0.13
    - ipython-kernel >= 0.12 && < 0.13
    - text
    - directory >= 1.3 && < 1.4
    - filepath >= 1.4 && < 1.6
    - process >= 1.6 && < 1.7

  fib:
    main:                Main.hs
    source-dirs: examples/fib
    ghc-options:
    - -threaded
    - -rtsopts
    - -with-rtsopts=-N
    dependencies:
    - base
    - howl

  laplace:
    main:                Main.hs
    source-dirs: examples/laplace
    ghc-options:
    - -threaded
    - -rtsopts
    - -with-rtsopts=-N
    dependencies:
    - base
    - howl
    - file-embed

  susyO2:
    main:                Main.hs
    source-dirs: examples/susyO2
    ghc-options:
    - -threaded
    - -rtsopts
    - -with-rtsopts=-N
    dependencies:
    - base
    - containers
    - howl
    - file-embed
    - matrix >= 0.3 && < 0.4

tests:
  howl-test:
    main:                Spec.hs
    source-dirs:         test
    ghc-options:
    - -threaded
    - -rtsopts
    - -with-rtsopts=-N
    dependencies:
    - base
    - containers
    - howl
    - rounded >= 1.1.1 && < 1.2
    - text
    - hspec
    - QuickCheck
